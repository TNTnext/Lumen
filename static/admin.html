<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen 管理后台</title>
  <link rel="preconnect" href="https://lf-code-agent.coze.cn" />
  <link rel="dns-prefetch" href="https://lf-code-agent.coze.cn" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js" defer></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #f5f5f7;
      --color-surface: #ffffff;
      --color-surface-hover: #f0f0f2;
      --color-border: #e5e5ea;
      --color-text: #1d1d1f;
      --color-text-secondary: #86868b;
      --color-text-tertiary: #aeaeb2;
      --color-accent: #0071e3;
      --color-accent-hover: #0077ed;
      --color-danger: #ff3b30;
      --color-success: #34c759;
      --color-warning: #ff9500;
      --color-sidebar: #f5f5f7;
      --color-sidebar-hover: #e8e8ed;
      --color-sidebar-active: #e0e0e5;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "Menlo", "Monaco", monospace;
    }
  </style>
</head>
<body class="bg-bg text-text font-sans antialiased">
  <!-- Skip to content -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-3 focus:left-3 focus:z-[100] focus:px-4 focus:py-2 focus:bg-accent focus:text-white focus:rounded-md focus:text-sm">跳转到主内容</a>

  <div id="app" class="flex h-screen overflow-hidden">
    <!-- Mobile overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/30 z-40 hidden lg:hidden" onclick="closeSidebar()" aria-hidden="true"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 lg:w-56 bg-sidebar border-r border-border flex flex-col shrink-0 -translate-x-full lg:translate-x-0 transition-transform duration-200" role="navigation" aria-label="主导航">
      <div class="px-5 py-5 flex items-center justify-between">
        <span class="text-sm font-semibold tracking-tight text-text">Lumen</span>
        <div class="flex items-center gap-2">
          <button id="langToggle" onclick="toggleLang()" class="text-xs px-2 py-0.5 rounded border border-border text-text-secondary hover:bg-sidebar-hover transition-colors" aria-label="切换语言" title="Switch Language">EN</button>
          <button onclick="closeSidebar()" class="lg:hidden text-text-secondary hover:text-text p-1" aria-label="关闭菜单">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
      <nav class="flex-1 px-3 space-y-0.5 overflow-y-auto" id="sidebar-nav" role="menubar" aria-label="导航菜单"></nav>
      <div class="px-3 py-3 border-t border-border">
        <div class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm text-text-secondary">
          <i data-lucide="user" class="w-4 h-4" aria-hidden="true"></i>
          <span id="sidebar-user" class="truncate">admin</span>
        </div>
        <button onclick="doLogout()" class="w-full flex items-center gap-2.5 px-2.5 py-2 mt-0.5 rounded-md text-sm text-text-secondary hover:bg-sidebar-hover transition-colors" aria-label="退出登录">
          <i data-lucide="log-out" class="w-4 h-4" aria-hidden="true"></i>
          <span data-lang-zh="退出登录" data-lang-en="Sign Out">退出登录</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto" id="main-content" role="main" aria-label="主内容区">
      <!-- Mobile top bar -->
      <div class="lg:hidden sticky top-0 z-30 bg-bg/80 backdrop-blur-md border-b border-border px-4 py-3 flex items-center gap-3">
        <button onclick="openSidebar()" class="text-text-secondary hover:text-text p-1" aria-label="打开菜单">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <span class="text-sm font-semibold">Lumen</span>
      </div>
      <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-8" id="page-container"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-lg text-sm font-medium shadow-lg opacity-0 transition-all duration-300 pointer-events-none z-[60]" role="status" aria-live="polite"></div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
