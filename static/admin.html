<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台</title>
  <link rel="preconnect" href="https://lf-code-agent.coze.cn" />
  <link rel="dns-prefetch" href="https://lf-code-agent.coze.cn" />
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js" defer></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #f5f5f7;
      --color-surface: #ffffff;
      --color-surface-hover: #f0f0f2;
      --color-border: #e5e5ea;
      --color-text: #1d1d1f;
      --color-text-secondary: #86868b;
      --color-text-tertiary: #aeaeb2;
      --color-accent: #0071e3;
      --color-accent-hover: #0077ed;
      --color-danger: #ff3b30;
      --color-success: #34c759;
      --color-warning: #ff9500;
      --color-sidebar: #f5f5f7;
      --color-sidebar-hover: #e8e8ed;
      --color-sidebar-active: #e0e0e5;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      --font-mono: "SF Mono", "Menlo", "Monaco", monospace;
    }
  </style>
</head>
<body class="bg-bg text-text font-sans antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-56 bg-sidebar border-r border-border flex flex-col shrink-0">
      <div class="px-5 py-5 flex items-center justify-between">
        <span class="text-sm font-semibold tracking-tight text-text">Lumen</span>
        <button id="langToggle" onclick="toggleLang()" class="text-xs px-2 py-0.5 rounded border border-border text-text-secondary hover:bg-sidebar-hover transition-colors" title="Switch Language">EN</button>
      </div>
      <nav class="flex-1 px-3 space-y-0.5 overflow-y-auto" id="sidebar-nav"></nav>
      <div class="px-3 py-3 border-t border-border">
        <div class="flex items-center gap-2.5 px-2.5 py-2 rounded-md text-sm text-text-secondary">
          <i data-lucide="user" class="w-4 h-4"></i>
          <span id="sidebar-user" class="truncate">admin</span>
        </div>
        <button onclick="doLogout()" class="w-full flex items-center gap-2.5 px-2.5 py-2 mt-0.5 rounded-md text-sm text-text-secondary hover:bg-sidebar-hover transition-colors">
          <i data-lucide="log-out" class="w-4 h-4"></i>
          <span>退出登录</span>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto" id="main-content">
      <div class="max-w-5xl mx-auto px-8 py-8" id="page-container"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-2.5 rounded-lg text-sm font-medium shadow-lg opacity-0 transition-all duration-300 pointer-events-none z-50"></div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
