<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/jquery/jquery-3.7.1.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/lucide/lucide-1.11.0.min.js"></script>
  <script src="https://lf-code-agent.coze.cn/obj/x-ai-cn/cdn/tailwindcss/tailwindcss-browser-4.2.4.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      /* === 品牌色 === */
      --color-primary:              #2F6BFF;
      --color-primary-container:    #D6E4FF;
      --color-on-primary:           #ffffff;
      /* === 背景 / 表面 === */
      --color-background:                 #F6F8FB;
      --color-surface-container-lowest:   #F0F2F7;
      --color-surface:                    #FFFFFF;
      --color-surface-container:          #EAEDF3;
      --color-surface-container-high:     #E4E8EF;
      --color-surface-container-highest:  #DEE3EB;
      /* === 文字 === */
      --color-on-surface:           #152033;
      --color-on-surface-variant:   #637089;
      /* === 功能色 === */
      --color-success:  #16A37B;
      --color-error:    #ef4444;
      --color-warning:  #f59e0b;
      /* === 边框 === */
      --color-outline:          #E6EAF2;
      --color-outline-variant:  #E6EAF2;
      /* === 圆角 === */
      --radius-sm:   0.25rem;
      --radius-md:   0.375rem;
      --radius-lg:   0.5rem;
      --radius-xl:   0.75rem;
      --radius-2xl:  1rem;
      --radius-full: 9999px;
      /* === 阴影 === */
      --shadow-card:   0 2px 8px rgba(0,0,0,0.06);
      --shadow-float:  0 10px 25px rgba(0,0,0,0.10);
      --shadow-dialog: 0 25px 50px rgba(0,0,0,0.15);
      /* === 字体 === */
      --font-sans: "Inter", system-ui, sans-serif;
    }
  </style>

  <!-- 图片兜底 -->
  <script>
    document.addEventListener('error', function (e) {
      const img = e.target;
      if (img.tagName !== 'IMG' || img.dataset.fallback) return;
      img.dataset.fallback = '1';
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const cat = img.getAttribute('data-category') || '其他';
      const alt = img.getAttribute('alt') || '';
      const label = esc(alt.length > 8 ? alt.slice(0, 8) + '…' : alt);
      const icons = { '人物': '👤', '自然风景': '🏞', '动物': '🐾', '建筑城市': '🏙', '运动体育': '⚽', '交通工具': '🚗', '食物': '🍽', '服饰时尚': '👗', '商业科技': '💼', '游戏娱乐': '🎮', '艺术': '🎨', '其他': '🖼' };
      const icon = icons[cat] || '🖼';
      const w = img.width || 400, h = img.height || 300;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><rect width="100%" height="100%" fill="%23f3f4f6"/><text x="50%" y="45%" text-anchor="middle" font-size="${Math.min(w, h) * 0.18}" dominant-baseline="central">${icon}</text><text x="50%" y="68%" text-anchor="middle" font-size="${Math.min(w, h) * 0.07}" fill="%239ca3af" font-family="system-ui,sans-serif" dominant-baseline="central">${label}</text></svg>`;
      img.src = 'data:image/svg+xml,' + svg;
    }, true);
  </script>
</head>

<body class="bg-background text-on-surface font-sans min-h-screen flex">

  <!-- @main-content:start -->
  <main class="flex flex-1 min-h-screen">

    <!-- ===== 左侧品牌介绍区 ===== -->
    <section class="hidden lg:flex w-1/2 bg-primary flex-col justify-center items-center px-16 relative overflow-hidden">
      <!-- 装饰背景 -->
      <div class="absolute inset-0 opacity-10">
        <div class="absolute -top-32 -right-32 w-96 h-96 rounded-full bg-white/20"></div>
        <div class="absolute -bottom-24 -left-24 w-80 h-80 rounded-full bg-white/15"></div>
        <div class="absolute top-1/3 right-1/4 w-48 h-48 rounded-full bg-white/10"></div>
      </div>

      <div class="relative z-10 max-w-md">
        <!-- Logo 区域 -->
        <div class="flex items-center gap-3 mb-10">
          <div class="w-12 h-12 rounded-xl bg-white/20 flex items-center justify-center backdrop-blur-sm">
            <i data-lucide="bot" class="w-7 h-7 text-white"></i>
          </div>
          <span class="text-2xl font-bold text-white tracking-tight">AI 对话管理平台</span>
        </div>

        <!-- 标语 -->
        <h1 class="text-4xl font-bold text-white leading-tight mb-6">
          智能对话<br/>高效管理
        </h1>
        <p class="text-lg text-white/70 leading-relaxed mb-10">
          一站式管理 AI 对话记录、用户权限与 API 密钥。
          让每一次对话都可追溯、可分析、可优化。
        </p>

        <!-- 特性列表 -->
        <div class="space-y-4">
          <!-- 特性-1 -->
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-lg bg-white/15 flex items-center justify-center shrink-0 mt-0.5">
              <i data-lucide="message-square" class="w-4 h-4 text-white"></i>
            </div>
            <div>
              <p class="text-sm font-semibold text-white">对话记录管理</p>
              <p class="text-xs text-white/55 mt-0.5">实时查看、搜索和分析所有 AI 对话历史</p>
            </div>
          </div>
          <!-- 特性-2 -->
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-lg bg-white/15 flex items-center justify-center shrink-0 mt-0.5">
              <i data-lucide="shield" class="w-4 h-4 text-white"></i>
            </div>
            <div>
              <p class="text-sm font-semibold text-white">权限精细控制</p>
              <p class="text-xs text-white/55 mt-0.5">基于角色的访问控制，保障数据安全</p>
            </div>
          </div>
          <!-- 特性-3 -->
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-lg bg-white/15 flex items-center justify-center shrink-0 mt-0.5">
              <i data-lucide="key" class="w-4 h-4 text-white"></i>
            </div>
            <div>
              <p class="text-sm font-semibold text-white">API 密钥管理</p>
              <p class="text-xs text-white/55 mt-0.5">统一管理 API 密钥，灵活控制调用权限</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 右侧登录表单区 ===== -->
    <section class="flex-1 flex items-center justify-center px-6 py-12 bg-background">
      <div class="w-full max-w-sm">

        <!-- 移动端 Logo（仅小屏可见） -->
        <div class="lg:hidden flex flex-col items-center mb-10">
          <div class="w-12 h-12 rounded-xl bg-primary flex items-center justify-center mb-4">
            <i data-lucide="bot" class="w-7 h-7 text-on-primary"></i>
          </div>
          <h2 class="text-xl font-bold text-on-surface">AI 对话管理平台</h2>
        </div>

        <!-- 登录标题 -->
        <div class="mb-8">
          <h2 class="text-2xl font-bold text-on-surface">欢迎回来</h2>
          <p class="text-sm text-on-surface-variant mt-2">请登录您的管理员账号</p>
        </div>

        <!-- 登录表单 -->
        <form id="login-form" class="space-y-5">
          <!-- 用户名 -->
          <div class="space-y-1.5">
            <label for="username" class="text-sm font-medium text-on-surface">用户名</label>
            <div class="relative">
              <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant/50"></i>
              <input
                id="username"
                type="text"
                placeholder="admin"
                autocomplete="username"
                class="w-full bg-surface-container border-none rounded-md pl-10 pr-3 py-2.5 text-sm
                       text-on-surface placeholder:text-on-surface-variant/50
                       focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all"
              />
            </div>
          </div>

          <!-- 密码 -->
          <div class="space-y-1.5">
            <label for="password" class="text-sm font-medium text-on-surface">密码</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-on-surface-variant/50"></i>
              <input
                id="password"
                type="password"
                placeholder="admin123"
                autocomplete="current-password"
                class="w-full bg-surface-container border-none rounded-md pl-10 pr-10 py-2.5 text-sm
                       text-on-surface placeholder:text-on-surface-variant/50
                       focus:outline-none focus:ring-2 focus:ring-primary/30 transition-all"
              />
              <button id="btn-toggle-password" type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-on-surface-variant transition-colors">
                <i data-lucide="eye-off" class="w-4 h-4"></i>
              </button>
            </div>
          </div>

          <!-- 记住我 & 忘记密码 -->
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 cursor-pointer">
              <input id="remember-me" type="checkbox" class="w-4 h-4 rounded-sm border-outline/40 text-primary focus:ring-primary/30" />
              <span class="text-xs text-on-surface-variant">记住登录状态</span>
            </label>
            <a href="#" id="link-forgot-password" class="text-xs font-medium text-primary hover:underline">忘记密码？</a>
          </div>

          <!-- 登录按钮 -->
          <button
            id="btn-login"
            type="submit"
            class="w-full bg-primary text-on-primary py-2.5 rounded-md text-sm font-semibold
                   hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          >
            登 录
            <i data-lucide="arrow-right" class="w-4 h-4"></i>
          </button>
        </form>

        <!-- 错误提示区域（默认隐藏） -->
        <div id="login-error" class="mt-4 hidden">
          <div class="flex items-center gap-2 bg-error/10 text-error rounded-md px-3 py-2.5 text-sm">
            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
            <span id="login-error-msg">用户名或密码错误</span>
          </div>
        </div>

        <!-- 底部提示 -->
        <p class="text-center text-xs text-on-surface-variant/60 mt-8">
          默认管理员账号：admin / admin123
        </p>
      </div>
    </section>

  </main>
  <!-- @main-content:end -->

  <script>
    $(function () {

      // 密码显隐切换
      $('#btn-toggle-password').on('click', function () {
        const $password = $('#password');
        const $icon = $(this).find('i');

        if ($password.attr('type') === 'password') {
          $password.attr('type', 'text');
          $icon.attr('data-lucide', 'eye');
        } else {
          $password.attr('type', 'password');
          $icon.attr('data-lucide', 'eye-off');
        }
        lucide.createIcons();
      });

      // 登录表单提交
      $('#login-form').on('submit', function (e) {
        e.preventDefault();

        const username = $('#username').val().trim();
        const password = $('#password').val().trim();

        // 简单校验：不为空即可
        if (!username || !password) {
          $('#login-error-msg').text('请输入用户名和密码');
          $('#login-error').removeClass('hidden');
          return;
        }

        // 登录页不判断账密，直接跳转到数据看板
        console.log('登录成功，跳转到 dashboard.html');
        window.location.href = 'dashboard.html';
      });

      // 忘记密码链接
      $('#link-forgot-password').on('click', function (e) {
        e.preventDefault();
        console.log('需要实现忘记密码流程：1. 弹出模态框让用户输入邮箱；2. 发送重置密码邮件；3. 显示发送成功提示');
      });

    });
  </script>

  <script>lucide.createIcons();</script>
</body>

</html>
